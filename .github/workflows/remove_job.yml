name: Remove Job by ID
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'The ID of the job to remove (found in jobs.json or HTML data-id)'
        required: true

jobs:
  delete-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Filter out the Job ID
        run: |
          # Use jq to select all objects EXCEPT the one with the matching ID
          jq --arg id "${{ github.event.inputs.job_id }}" 'del(.[] | select(.id == $id))' jobs.json > temp.json && mv temp.json jobs.json

      - name: Commit and Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add jobs.json
          git commit -m "Removed job ID: ${{ github.event.inputs.job_id }}"
          git push