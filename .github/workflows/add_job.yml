name: Add or Edit Job
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Leave empty for NEW job, or enter ID to EDIT'
        required: false
      title:
        description: 'Job Title'
        required: false
        default: 'Software Engineer'
      location:
        description: 'Location'
        required: false
        default: 'Remote'
      company:
        description: 'Company Name'
        required: false
        default: 'UNREAL Inc.'
      type:
        description: 'Job Type (Full-time, Part-time, Internship, Contract)'
        required: false
        default: 'Full-time'
      salary:
        description: 'Salary Range (e.g. $100,000 - $140,000)'
        required: false
        default: '$100,000 - $140,000'
      description:
        description: 'Job Description'
        required: false
        default: 'We are looking for a talented and motivated employee to join our team.'
      requirements:
        description: 'Requirements (comma-separated list)'
        required: false
        default: '5+ years of experience'

jobs:
  upsert-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Process Job Data
        id: process
        run: |
          TITLE="${{ github.event.inputs.title || 'Software Engineer' }}"
          LOCATION="${{ github.event.inputs.location || 'Remote' }}"
          COMPANY="${{ github.event.inputs.company || 'UNREAL Inc.' }}"
          TYPE="${{ github.event.inputs.type || 'Full-time' }}"
          SALARY="${{ github.event.inputs.salary }}"
          DESCRIPTION="${{ github.event.inputs.description }}"
          REQUIREMENTS="${{ github.event.inputs.requirements }}"
          INPUT_ID="${{ github.event.inputs.job_id }}"
          
          # Convert comma-separated requirements to JSON array
          if [ -n "$REQUIREMENTS" ]; then
            REQ_JSON=$(echo "$REQUIREMENTS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -s .)
          else
            REQ_JSON="[]"
          fi
          
          if [ -z "$INPUT_ID" ]; then
            # NEW JOB: Use current timestamp as ID
            FINAL_ID=$(date +%s)
            jq --arg title "$TITLE" \
               --arg location "$LOCATION" \
               --arg company "$COMPANY" \
               --arg type "$TYPE" \
               --arg salary "$SALARY" \
               --arg desc "$DESCRIPTION" \
               --argjson reqs "$REQ_JSON" \
               --arg posted "$(date +%Y-%m-%d)" \
               --arg id "$FINAL_ID" \
               '. += [{"id": $id, "title": $title, "company": $company, "location": $location, "type": $type, "salary": $salary, "posted": $posted, "description": $desc, "requirements": $reqs}]' jobs.json > temp.json
            echo "status=Created new job with ID: $FINAL_ID" >> $GITHUB_OUTPUT
          else
            # EDIT JOB: Update existing ID
            FINAL_ID=$INPUT_ID
            jq --arg title "$TITLE" \
               --arg location "$LOCATION" \
               --arg company "$COMPANY" \
               --arg type "$TYPE" \
               --arg salary "$SALARY" \
               --arg desc "$DESCRIPTION" \
               --argjson reqs "$REQ_JSON" \
               --arg id "$INPUT_ID" \
               'map(if .id == $id then . + {"title": $title, "company": $company, "location": $location, "type": $type, "salary": $salary, "description": $desc, "requirements": $reqs} else . end)' jobs.json > temp.json
            echo "status=Updated job ID: $FINAL_ID" >> $GITHUB_OUTPUT
          fi
          
          mv temp.json jobs.json
          echo "final_id=$FINAL_ID" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add jobs.json
          git commit -m "Update Job Board (ID: ${{ steps.process.outputs.final_id }})"
          git push

      - name: Output Summary
        run: |
          echo "### Job Operation Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Action:** ${{ steps.process.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Job ID:** \`${{ steps.process.outputs.final_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Use this ID if you need to edit or delete this role later." >> $GITHUB_STEP_SUMMARY